name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Build
        env:
          VITE_LUBEAVTO_API_BASE: ${{ vars.VITE_LUBEAVTO_API_BASE }}
          VITE_LUBEAVTO_API_TOKEN: ${{ secrets.VITE_LUBEAVTO_API_TOKEN }}
          VITE_EFPF_API_BASE: ${{ vars.VITE_EFPF_API_BASE }}
          VITE_EFPF_API_KEY: ${{ secrets.VITE_EFPF_API_KEY }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.VITE_POSTHOG_HOST }}
        run: npm run build

      - name: Copy index.html to 404.html (SPA fallback)
        # GH Pages 404.html already handled by our redirector in public/,
        # but we also copy index → 404 as a belt-and-braces fallback for
        # direct-deep-link refresh.
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

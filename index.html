<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#050807" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>ECOFACTOR Marketplace</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Restore SPA path after 404.html redirect on GitHub Pages.
      // See public/404.html — it encodes the original path as ?/... here.
      (function () {
        if (location.search.indexOf('?/') === 0 || location.search.indexOf('&/') >= 0) {
          var l = location;
          var decoded = l.search.slice(1).split('&').map(function (s, i) {
            return s.replace(/~and~/g, '&');
          });
          // first segment starts with '/'
          decoded[0] = decoded[0].replace(/^\//, '');
          var path = '/' + decoded[0];
          var query = decoded.slice(1).join('&');
          history.replaceState(null, '', l.pathname + path + (query ? '?' + query : '') + l.hash);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

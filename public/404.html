<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ECOFACTOR Marketplace</title>
  <script>
    // GitHub Pages SPA fallback: stash the original path/query into a single
    // query parameter on /<repo>/ so the SPA can restore it after load.
    (function () {
      var segmentCount = 1; // repo name segment
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    })();
  </script>
</head>
<body></body>
</html>
